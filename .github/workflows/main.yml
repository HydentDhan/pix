name: Build jar

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Get jar filename
      id: jar_name
      run: |
        JAR=$(basename neo21/build/libs/*.jar)
        echo "JAR_NAME=$JAR" >> $GITHUB_OUTPUT

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.jar_name.outputs.JAR_NAME }}
        path: neo21/build/libs/*.jar